name: build-masters

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 1 * *"  # 1st of each month, 04:00 UTC

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -e .
      - name: Build masters.json
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Set repo var GEMINI_MODEL=gemini-2.5-flash-lite (or gemini-2.5-flash);
          # the free tier is ~20 generate-requests/day per model, so a full
          # backfill converges over several runs (the commentary cache is
          # committed below and resumes each run).
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
        run: crawler build-masters
      - name: Re-host images to Wikimedia Commons
        # AIC's IIIF server Cloudflare-blocks cross-origin <img> embedding, so the
        # build's AIC image URLs 403 for end users. Re-point each work to the same
        # public-domain work on Wikimedia Commons (reliable hotlinking) and fill
        # master portraits. Keeps commentary; drops works with no Commons match.
        run: python scripts/rehost_images_wikimedia.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Commit BOTH the output and the commentary cache so each run resumes
          # from the last and the free-tier backfill converges over time.
          git add web/public/data/masters.json data/masters_commentary_cache.json
          git diff --cached --quiet || git commit -m "data(masters): refresh masters.json + commentary cache"
          git push
