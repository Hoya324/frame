name: crawl
on:
  schedule:
    - cron: '0 18 * * *'  # 03:00 KST = 18:00 UTC 전일
  workflow_dispatch:
    inputs:
      reset:
        description: '크롤 전에 시트 데이터를 전부 비우고 다시 채움 (전체 초기화)'
        type: boolean
        default: false
concurrency:
  group: crawl
  cancel-in-progress: false
jobs:
  crawl:
    runs-on: ubuntu-latest
    # Raised from 20: the first translation backfill (Argos, CPU-only) is heavy.
    # Each run flushes progress in batches and skips already-translated rows, so
    # even if a run hits this ceiling the backfill converges over later runs.
    timeout-minutes: 45
    permissions:
      contents: write
      actions: write  # dispatch deploy-pages after a data push
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -e .
      # Persist the Argos language packages (~hundreds of MB) across runs so the
      # translation backfill below doesn't re-download them every day.
      - name: Cache Argos translation models
        uses: actions/cache@v4
        with:
          path: ~/.local/share/argos-translate
          key: argos-models-v1
      # Full reset: only on a manual run with the `reset` box checked. Wipes
      # every sheet's data (and restores headers) so the crawl below starts
      # from a clean store — purges stale non-photo rows, duplicates, and
      # bad-coordinate venues that upsert can never remove. The scheduled run
      # never hits this, so the daily job keeps incrementally upserting.
      - name: Reset sheets (full wipe)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.reset }}
        run: crawler reset-sheets
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
      # Idempotent. Verifies sheet headers, and prefix-appends any new
      # columns added to init_sheets.HEADERS since the last run so the
      # serializer can actually write them.
      - run: crawler init-sheets
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
      - run: crawler run-all
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      # Sweep up any venues that ended the crawl without coordinates —
      # mostly TAB venues whose first geocode hit was a transient miss
      # plus the legacy long-tail of pre-country-field rows. Idempotent;
      # filtered to venues with empty latitude/longitude.
      # `if: always()` so a per-source failure in run-all (which exits 1 by
      # design) doesn't skip the backfill — otherwise Japan venues never get
      # coordinates. `continue-on-error` so a backfill blip doesn't mask the
      # run-all result.
      - name: Backfill missing geocodes
        if: always()
        run: crawler backfill-geocodes
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      # Pre-translate title/description/name into the other locales (ko/en/ja)
      # so the web UI can offer a translation toggle. Idempotent and batched:
      # only missing locale/field combos are translated, and progress is flushed
      # in chunks, so a run that hits the timeout still advances the backfill.
      # `if: always()` mirrors the geocode step (run-all exits 1 by design on a
      # per-source failure); `continue-on-error` so a translate blip can't strand
      # the export/commit below on stale data.
      - name: Backfill missing translations
        if: always()
        run: crawler backfill-translations
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          # Use the Gemini LLM translator when the key is configured; without it
          # the crawler falls back to the offline Argos engine.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      # Regenerate the static catalog snapshot the web app reads, then commit
      # it back so the deployed site picks up the latest crawl. Runs even when
      # run-all exits non-zero (e.g. a single source 403s) — the sheet is
      # already populated per-source, so a partial failure shouldn't strand the
      # site on stale data.
      - name: Export catalog JSON for web
        if: always()
        run: crawler export-json --out web/public/data/exhibitions.json
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
      - name: Commit updated catalog
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/exhibitions.json
          git diff --staged --quiet && exit 0
          git commit -m "chore(data): refresh exhibitions.json"
          # main can move ahead between checkout and push (human pushes, prior
          # runs). Rebase onto origin/main and retry; exhibitions.json is fully
          # regenerated from the sheet, so favor our freshly-exported copy on
          # conflict (-X theirs = the commit being replayed during rebase).
          for attempt in 1 2 3 4 5; do
            if git push; then
              # github-actions[bot] pushes via GITHUB_TOKEN, which (anti-recursion)
              # does NOT trigger deploy-pages' on:push — so dispatch it explicitly
              # to publish the refreshed data (workflow_dispatch IS exempt from the
              # GITHUB_TOKEN no-trigger rule). Non-fatal: the data is already pushed.
              gh workflow run deploy-pages.yml --ref main \
                || echo "::warning::deploy-pages dispatch failed; data pushed, site updates on next deploy"
              exit 0
            fi
            echo "push rejected (attempt $attempt), rebasing onto origin/main..."
            git pull --rebase -X theirs --autostash origin main
          done
          echo "::error::failed to push refreshed catalog after 5 attempts"
          exit 1
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-report
          path: out/
          if-no-files-found: warn
      - if: always()
        run: |
          if [ -f out/report.md ]; then
            cat out/report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_(no report.md produced)_" >> "$GITHUB_STEP_SUMMARY"
          fi
