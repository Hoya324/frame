name: crawl
on:
  schedule:
    - cron: '0 18 * * *'  # 03:00 KST = 18:00 UTC 전일
  workflow_dispatch:
concurrency:
  group: crawl
  cancel-in-progress: false
jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -e .
      # Idempotent. Verifies sheet headers, and prefix-appends any new
      # columns added to init_sheets.HEADERS since the last run so the
      # serializer can actually write them.
      - run: crawler init-sheets
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
      - run: crawler run-all
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      # Sweep up any venues that ended the crawl without coordinates —
      # mostly TAB venues whose first geocode hit was a transient miss
      # plus the legacy long-tail of pre-country-field rows. Idempotent;
      # filtered to venues with empty latitude/longitude. `continue-on-error`
      # so a backfill blip doesn't mask the actual run-all result above.
      - run: crawler backfill-geocodes
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      # Regenerate the static catalog snapshot the web app reads, then commit
      # it back so the deployed site picks up the latest crawl. Runs even when
      # run-all exits non-zero (e.g. a single source 403s) — the sheet is
      # already populated per-source, so a partial failure shouldn't strand the
      # site on stale data.
      - name: Export catalog JSON for web
        if: always()
        run: crawler export-json --out web/public/data/exhibitions.json
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
      - name: Commit updated catalog
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/exhibitions.json
          git diff --staged --quiet || git commit -m "chore(data): refresh exhibitions.json [skip ci]"
          git push
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-report
          path: out/
          if-no-files-found: warn
      - if: always()
        run: |
          if [ -f out/report.md ]; then
            cat out/report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_(no report.md produced)_" >> "$GITHUB_STEP_SUMMARY"
          fi
