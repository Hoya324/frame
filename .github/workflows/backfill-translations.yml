name: backfill-translations
# Translation backfill, then export + commit the refreshed catalog. Runs on a
# 3-hourly schedule (incremental) so freshly crawled rows get translated quickly,
# and on demand via workflow_dispatch (with an optional one-off `reset`).
# Idempotent: by default only fills MISSING translations. Tick `reset` once to
# rebuild everything after switching translation engines — it clears each row's
# in-scope translations (covering every row regardless of the budget) and refills
# what the budget/quota allows. Scheduled runs never reset (the `reset` input is
# absent off workflow_dispatch). With several comma-separated GEMINI_API_KEY keys
# the per-minute rate limit effectively disappears and the backlog clears in a
# run or two; a single key converges over more runs.
on:
  schedule:
    # Every 3 hours at :30 — offset from the daily crawl (18:00 UTC) so they
    # don't queue on top of each other (both share the `crawl` concurrency group).
    - cron: '30 */3 * * *'
  workflow_dispatch:
    inputs:
      reset:
        description: "Rebuild ALL in-scope translations (clear + refill). Use once after switching translation engines; the daily job finishes the rest."
        type: boolean
        default: false
# Share the crawl group so a manual backfill never writes/commits the sheet at
# the same time as the daily crawl.
concurrency:
  group: crawl
  cancel-in-progress: false
jobs:
  backfill:
    runs-on: ubuntu-latest
    # Bounded by the per-run budget below; the daily job resumes what's left.
    timeout-minutes: 45
    permissions:
      contents: write
      actions: write  # dispatch deploy-pages after a data push
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -e .
      # Same cache key as crawl.yml so the two workflows share Argos packages.
      - name: Cache Argos translation models
        uses: actions/cache@v4
        with:
          path: ~/.local/share/argos-translate
          key: argos-models-v1
      # Budgeted (30 min) so a free-tier-throttled run stops cleanly instead of
      # thrashing on rate-limit retries; the daily crawl job resumes the rest.
      # --reset (optional input) clears + rebuilds all translations — tick once
      # after switching translation engines.
      # continue-on-error: a run that does nothing (quota exhausted / Gemini
      # overload) exits non-zero but is expected and resumable — it must not flag
      # the workflow red. The export/commit steps below still run (if: always()).
      - name: Backfill translations
        continue-on-error: true
        run: crawler backfill-translations --max-seconds 1800 ${{ inputs.reset && '--reset' || '' }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          # Use the Gemini LLM translator when the key is configured; without it
          # the crawler falls back to the offline Argos engine.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      # Regenerate the static catalog snapshot the web app reads, then commit it
      # back so the deployed site picks up the freshly translated content.
      - name: Export catalog JSON for web
        if: always()
        run: crawler export-json --out web/public/data/exhibitions.json
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
      - name: Commit updated catalog
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/exhibitions.json
          git diff --staged --quiet && exit 0
          git commit -m "chore(data): refresh exhibitions.json (full translation backfill)"
          # main can move ahead between checkout and push (human pushes, prior
          # runs). Rebase onto origin/main and retry; exhibitions.json is fully
          # regenerated from the sheet, so favor our freshly-exported copy on
          # conflict (-X theirs = the commit being replayed during rebase).
          for attempt in 1 2 3 4 5; do
            if git push; then
              # github-actions[bot] pushes via GITHUB_TOKEN, which (anti-recursion)
              # does NOT trigger deploy-pages' on:push — so dispatch it explicitly
              # to publish the refreshed data (workflow_dispatch IS exempt from the
              # GITHUB_TOKEN no-trigger rule). Non-fatal: the data is already pushed.
              gh workflow run deploy-pages.yml --ref main \
                || echo "::warning::deploy-pages dispatch failed; data pushed, site updates on next deploy"
              exit 0
            fi
            echo "push rejected (attempt $attempt), rebasing onto origin/main..."
            git pull --rebase -X theirs --autostash origin main
          done
          echo "::error::failed to push refreshed catalog after 5 attempts"
          exit 1
