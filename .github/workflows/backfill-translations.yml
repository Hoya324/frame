name: backfill-translations
# Manual translation backfill, then export + commit the refreshed catalog.
# Idempotent: by default only fills MISSING translations. Tick `reset` once to
# rebuild everything after switching translation engines — it clears each row's
# in-scope translations (covering every row regardless of the budget) and refills
# what the budget/quota allows. The daily `crawl` job then resumes the rest: with
# the free-tier Gemini key a full rebuild can't finish in one run (per-minute /
# per-day rate limits), so this kicks it off and the daily incremental backfill
# converges over the following days. Re-run any time.
on:
  workflow_dispatch:
    inputs:
      reset:
        description: "Rebuild ALL in-scope translations (clear + refill). Use once after switching translation engines; the daily job finishes the rest."
        type: boolean
        default: false
# Share the crawl group so a manual backfill never writes/commits the sheet at
# the same time as the daily crawl.
concurrency:
  group: crawl
  cancel-in-progress: false
jobs:
  backfill:
    runs-on: ubuntu-latest
    # Bounded by the per-run budget below; the daily job resumes what's left.
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -e .
      # Same cache key as crawl.yml so the two workflows share Argos packages.
      - name: Cache Argos translation models
        uses: actions/cache@v4
        with:
          path: ~/.local/share/argos-translate
          key: argos-models-v1
      # Budgeted (30 min) so a free-tier-throttled run stops cleanly instead of
      # thrashing on rate-limit retries; the daily crawl job resumes the rest.
      # --reset (optional input) clears + rebuilds all translations — tick once
      # after switching translation engines.
      # continue-on-error: a run that does nothing (quota exhausted / Gemini
      # overload) exits non-zero but is expected and resumable — it must not flag
      # the workflow red. The export/commit steps below still run (if: always()).
      - name: Backfill translations
        continue-on-error: true
        run: crawler backfill-translations --max-seconds 1800 ${{ inputs.reset && '--reset' || '' }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          # Use the Gemini LLM translator when the key is configured; without it
          # the crawler falls back to the offline Argos engine.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      # Regenerate the static catalog snapshot the web app reads, then commit it
      # back so the deployed site picks up the freshly translated content.
      - name: Export catalog JSON for web
        if: always()
        run: crawler export-json --out web/public/data/exhibitions.json
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
      - name: Commit updated catalog
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/exhibitions.json
          git diff --staged --quiet || git commit -m "chore(data): refresh exhibitions.json (full translation backfill)"
          git push
