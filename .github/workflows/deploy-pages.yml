name: deploy-pages
on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:
concurrency:
  group: pages
  cancel-in-progress: true
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Build static export
        run: npm run build
        env:
          # Served at the custom apex domain root (frame-photo.cloud), so no basePath.
          BASE_PATH: ""
          # Public by design: NEXT_PUBLIC_* values are inlined into the client
          # bundle, and the publishable key is browser-safe (RLS guards data).
          NEXT_PUBLIC_SUPABASE_URL: https://muxzrjtncgrozlnefexu.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_4VVyeQtqiSfZLouI8H85Zg_VcmRsaj3
      - run: touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
